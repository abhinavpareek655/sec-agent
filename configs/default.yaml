llm:
  provider: groq
  model: meta-llama/llama-4-scout-17b-16e-instruct

targets:
  http_hosts:
    - localhost
    - httpbin.org
  nmap_hosts:
    - localhost
    - scanme.nmap.org

agent:
  default_goal: "Probe the Juice Shop app on localhost:3000, identify endpoints that return varied responses such as 200s, 401s, redirects, and Prometheus metrics, and summarize what the application exposes."
  max_episode_steps: 5

training:
  total_timesteps: 120
  n_steps: 12
  batch_size: 6
  n_epochs: 4

ollama:
  base_url: http://localhost:11434
  model: llama3.2