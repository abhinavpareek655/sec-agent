llm:
  provider: ollama
  base_url: https://a35d-34-126-155-207.ngrok-free.app/
  model: llama3.1:8b

targets:
  http_hosts:
    - localhost
    - httpbin.org
  nmap_hosts:
    - localhost
    - scanme.nmap.org

agent:
  default_goal: "Probe the Juice Shop app on localhost:3000, identify endpoints that return varied responses such as 200s, 401s, redirects, and Prometheus metrics, and summarize what the application exposes."
  max_episode_steps: 5

training:
  total_timesteps: 120
  n_steps: 12
  batch_size: 6
  n_epochs: 4

ollama:
  base_url: https://a35d-34-126-155-207.ngrok-free.app/
  model: llama3.1:8b