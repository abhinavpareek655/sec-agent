llm:
  provider: groq
  model: meta-llama/llama-4-scout-17b-16e-instruct

targets:
  http_hosts:
    - localhost
    - httpbin.org
  nmap_hosts:
    - localhost
    - scanme.nmap.org

agent:
  default_goal: "Check what is running on localhost:3000 and identify what kind of application it is."
  max_episode_steps: 5

training:
  total_timesteps: 30
  n_steps: 12
  batch_size: 6
  n_epochs: 4

ollama:
  base_url: http://localhost:11434
  model: llama3.2